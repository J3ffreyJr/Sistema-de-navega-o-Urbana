spring.application.name=urban-nav

# Caminho do ficheiro OSM
# Em produção (Render) usa a variável de ambiente OSM_FILE_PATH
# Em desenvolvimento usa o ficheiro local
osm.file.path=${OSM_FILE_PATH:src/main/resources/data/maputo.osm}

# Porta — Render define via PORT, localmente usa 8080
server.port=${PORT:8080}

# Aumentar timeout para carregamento do grafo
spring.mvc.async.request-timeout=120000

# CORS — permite frontend externo (GitHub Pages, etc.)
spring.web.cors.allowed-origins=*

# Logging
logging.level.com.urbanav=INFO
logging.level.root=WARN